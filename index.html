<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>Mobile FPS 3D</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
touch-action:none;
font-family:Arial,sans-serif;
}

canvas{
display:block;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:18px;
z-index:100;
text-shadow:1px 1px 3px black;
}

#crosshair{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
color:white;
font-size:32px;
font-weight:bold;
z-index:100;
pointer-events:none;
}

#joystick{
position:fixed;
left:20px;
bottom:20px;
width:140px;
height:140px;
border-radius:50%;
background:rgba(255,255,255,.15);
z-index:100;
}

#stick{
position:absolute;
width:60px;
height:60px;
left:40px;
top:40px;
border-radius:50%;
background:white;
}

#fire{
position:fixed;
right:20px;
bottom:70px;
width:90px;
height:90px;
border-radius:50%;
background:rgba(255,0,0,.4);
color:white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
z-index:100;
}

#scope{
position:fixed;
right:130px;
bottom:100px;
width:70px;
height:70px;
border-radius:50%;
background:rgba(0,100,255,.4);
color:white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
z-index:100;
}

#reload{
position:fixed;
right:120px;
bottom:20px;
width:80px;
height:50px;
border-radius:10px;
background:rgba(255,255,255,.2);
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:14px;
z-index:100;
}

</style>
</head>

<body>

<div id="hud">
HP: 100<br>
Ammo: 30/90<br>
Kills: 0
</div>

<div id="crosshair">+</div>

<div id="joystick">
<div id="stick"></div>
</div>

<div id="scope">
ZOOM
</div>

<div id="reload">
RELOAD
</div>

<div id="fire">
FIRE
</div>

<script type="module" src="game.js"></script>

</body>
</html>
