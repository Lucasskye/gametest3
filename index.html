<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Mobile FPS 3D</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
touch-action:none;
font-family:Arial,sans-serif;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
z-index:100;
font-size:18px;
}

#crosshair{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
color:white;
font-size:32px;
z-index:100;
pointer-events:none;
}

#joystick{
position:fixed;
left:20px;
bottom:20px;
width:140px;
height:140px;
border-radius:50%;
background:rgba(255,255,255,.15);
z-index:100;
}

#stick{
position:absolute;
width:60px;
height:60px;
left:40px;
top:40px;
border-radius:50%;
background:white;
}

#fire{
position:fixed;
right:20px;
bottom:60px;
width:90px;
height:90px;
border-radius:50%;
background:rgba(255,0,0,.4);
color:white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
z-index:100;
}

#scope{
position:fixed;
right:130px;
bottom:90px;
width:70px;
height:70px;
border-radius:50%;
background:rgba(0,120,255,.4);
color:white;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
}
</style>
</head>

<body>

<div id="hud">
HP: 100<br>
Ammo: 30/90<br>
Kills: 0
</div>

<div id="crosshair">+</div>

<div id="joystick">
<div id="stick"></div>
</div>

<div id="scope">ZOOM</div>
<div id="fire">FIRE</div>

<script type="module">
import * as THREE from
"https://unpkg.com/three@0.160.0/build/three.module.js";
  const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x87ceeb);

const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth /
window.innerHeight,
0.1,
1000
);

camera.position.set(
0,
1.7,
5
);

const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);

const ambient =
new THREE.AmbientLight(
0xffffff,
2
);

scene.add(ambient);

const sun =
new THREE.DirectionalLight(
0xffffff,
1.5
);

sun.position.set(
10,
20,
10
);

scene.add(sun);

const floor =
new THREE.Mesh(
new THREE.PlaneGeometry(
200,
200
),
new THREE.MeshStandardMaterial({
color:0x666666
})
);

floor.rotation.x =
-Math.PI/2;

scene.add(floor);

function createWall(x,z){

const wall =
new THREE.Mesh(
new THREE.BoxGeometry(
2,
2,
2
),
new THREE.MeshStandardMaterial({
color:0x888888
})
);

wall.position.set(
x,
1,
z
);

scene.add(wall);

}

for(let i=-20;i<=20;i+=5){

createWall(i,-20);

}

createWall(-15,-5);
createWall(-15,5);

createWall(15,-5);
createWall(15,5);

createWall(0,10);
createWall(5,10);
createWall(-5,10);

const gun =
new THREE.Group();

const gunBody =
new THREE.Mesh(
new THREE.BoxGeometry(
0.3,
0.2,
1
),
new THREE.MeshStandardMaterial({
color:0x222222
})
);

const barrel =
new THREE.Mesh(
new THREE.BoxGeometry(
0.08,
0.08,
0.8
),
new THREE.MeshStandardMaterial({
color:0x444444
})
);

barrel.position.z =
-0.8;

gun.add(gunBody);
gun.add(barrel);

gun.position.set(
0.45,
-0.35,
-1
);

camera.add(gun);

scene.add(camera);

let yaw = 0;
let pitch = 0;

let moveX = 0;
let moveY = 0;

let recoil = 0;

let hp = 100;
let ammo = 30;
let reserveAmmo = 90;
let kills = 0;

const hud =
document.getElementById(
"hud"
);

function updateHUD(){

hud.innerHTML =
`HP: ${hp}<br>
Ammo: ${ammo}/${reserveAmmo}<br>
Kills: ${kills}`;

}

updateHUD();
  const joystick =
document.getElementById(
"joystick"
);

const stick =
document.getElementById(
"stick"
);

let joystickActive = false;

joystick.addEventListener(
"touchstart",
()=>{
joystickActive = true;
}
);

joystick.addEventListener(
"touchend",
()=>{

joystickActive = false;

moveX = 0;
moveY = 0;

stick.style.left = "40px";
stick.style.top = "40px";

}
);

joystick.addEventListener(
"touchmove",
e=>{

const rect =
joystick.getBoundingClientRect();

const x =
e.touches[0].clientX -
rect.left - 70;

const y =
e.touches[0].clientY -
rect.top - 70;

moveX = Math.max(
-1,
Math.min(1,x/50)
);

moveY = Math.max(
-1,
Math.min(1,y/50)
);

stick.style.left =
(40+x)+"px";

stick.style.top =
(40+y)+"px";

}
);

let lookX = null;
let lookY = null;

document.addEventListener(
"touchmove",
e=>{

if(
e.target===joystick ||
e.target===stick
)return;

const t = e.touches[0];

if(lookX!==null){

yaw -=
(t.clientX-lookX)
*0.004;

pitch -=
(t.clientY-lookY)
*0.004;

pitch =
Math.max(
-1.3,
Math.min(
1.3,
pitch
)
);

}

lookX =
t.clientX;

lookY =
t.clientY;

}
);

document.addEventListener(
"touchend",
()=>{

lookX = null;
lookY = null;

}
);

window.addEventListener(
"resize",
()=>{

camera.aspect =
window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

function animate(){

requestAnimationFrame(
animate
);

camera.rotation.order =
"YXZ";

camera.rotation.y =
yaw;

camera.rotation.x =
pitch - recoil;

recoil *= 0.85;

camera.position.x +=
Math.sin(yaw)
*(-moveY)
*0.08;

camera.position.z +=
Math.cos(yaw)
*(-moveY)
*0.08;

camera.position.x +=
Math.sin(
yaw+Math.PI/2
)
*(-moveX)
*0.05;

camera.position.z +=
Math.cos(
yaw+Math.PI/2
)
*(-moveX)
*0.05;

gun.rotation.x =
recoil * 8;

renderer.render(
scene,
camera
);

}

animate();
  </script>
</body>
</html>
